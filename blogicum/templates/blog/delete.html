{% extends "base.html" %}

{% block title %}
  Удаление публикации
{% endblock %}

{% block content %}
  <div class="container py-5">
    <h1>Удалить публикацию?</h1>
    <p>Вы уверены, что хотите удалить "{{ object.title }}"? Это действие нельзя отменить.</p>
    
    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Да, удалить</button>
      <a href="{% url 'blog:post_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
    </form>
  </div>
{% endblock %}
